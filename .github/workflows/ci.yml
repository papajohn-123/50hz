name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e '.[dev]'
      - run: pytest -q
      - name: Validate migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost/50hz
        run: alembic upgrade head --sql > /tmp/50hz-migrations.sql

  ios:
    name: iOS build and test bundle
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Build app and test bundle
        run: >-
          xcodebuild -quiet
          -project ios/50Hz.xcodeproj
          -scheme 50Hz
          -configuration Debug
          -sdk iphonesimulator
          -destination 'generic/platform=iOS Simulator'
          -derivedDataPath /tmp/50hz-derived
          CODE_SIGNING_ALLOWED=NO
          build-for-testing
